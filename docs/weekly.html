<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weekly Top 10</title>
  <style>
    :root {
      --bg: #f5efe4;
      --bg-alt: #eaf3ff;
      --panel: rgba(255, 252, 245, 0.88);
      --ink: #1f2937;
      --muted: #6b7280;
      --line: rgba(148, 163, 184, 0.35);
      --accent: #0f766e;
      --accent-2: #b45309;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #fde68a 0, transparent 24%),
        radial-gradient(circle at top right, #bfdbfe 0, transparent 26%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-alt) 100%);
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(14px);
      background: rgba(255, 250, 240, 0.82);
      border-bottom: 1px solid var(--line);
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand {
      display: inline-flex;
      flex-direction: column;
      gap: 2px;
      color: var(--ink);
    }
    .brand strong {
      font-size: 15px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .brand span {
      font-size: 13px;
      color: var(--muted);
    }
    .menu-toggle {
      display: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.7);
      border-radius: 999px;
      width: 44px;
      height: 44px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }
    .menu-icon {
      display: inline-flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
      justify-content: center;
    }
    .menu-icon span {
      display: block;
      width: 18px;
      height: 2px;
      background: var(--ink);
      border-radius: 999px;
    }
    .site-nav {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .site-nav a {
      color: var(--ink);
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid transparent;
    }
    .site-nav a[aria-current="page"] {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .site-nav a:hover {
      background: rgba(255,255,255,0.72);
      border-color: var(--line);
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 20px 64px;
    }
    .hero {
      margin-bottom: 24px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 7vw, 64px);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(15px, 2.4vw, 18px);
      max-width: 720px;
    }
    .date-selector {
      margin: 0 0 22px;
    }
    .date-select {
      width: min(280px, 100%);
      border: 1px solid var(--line);
      background: rgba(255, 250, 240, 0.92);
      color: var(--ink);
      padding: 12px 14px;
      border-radius: 14px;
      font: inherit;
    }
    .filter-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 0 0 18px;
    }
    .tab-button,
    .filter-button {
      border: 1px solid var(--line);
      background: rgba(255, 250, 240, 0.72);
      color: var(--ink);
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      font: inherit;
      transition: transform 120ms ease, background 120ms ease;
    }
    .tab-button:hover,
    .filter-button:hover {
      transform: translateY(-1px);
      background: #fff;
    }
    .tab-button.active,
    .filter-button.active {
      background: var(--accent-2);
      color: white;
      border-color: var(--accent-2);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .card.hidden-by-filter { display: none; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      margin: 0 0 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.9);
      flex: 0 0 auto;
    }
    .card-title-wrap {
      min-width: 0;
      flex: 1 1 auto;
    }
    .owner-line {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 4px;
    }
    .owner-line a {
      color: var(--muted);
    }
    .description {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }
    .pick-reason {
      margin: 0 0 10px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 12px;
      opacity: 0.82;
    }
    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0 0;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.74);
      border: 1px solid var(--line);
      color: var(--ink);
      font-size: 12px;
      line-height: 1;
    }
    .badge.topic {
      background: rgba(15, 118, 110, 0.08);
      color: var(--accent);
      border-color: rgba(15, 118, 110, 0.16);
    }
    .date-label {
      font-variant-numeric: tabular-nums;
    }
    .rank-card {
      position: relative;
      overflow: hidden;
    }
    .rank-card::after {
      content: "";
      position: absolute;
      inset: auto -40px -40px auto;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15,118,110,0.14) 0, rgba(15,118,110,0) 70%);
      pointer-events: none;
    }
    .rank-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      font-weight: 700;
      font-size: 18px;
      flex: 0 0 auto;
    }
    .rank-card.top1 {
      border-width: 2px;
      border-color: rgba(180, 83, 9, 0.32);
      background: linear-gradient(135deg, rgba(255,250,240,0.96), rgba(254,243,199,0.92));
    }
    .rank-card.top1 .rank-number {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #b45309, #f59e0b);
      font-size: 22px;
    }
    .rank-card.top2 .rank-number,
    .rank-card.top3 .rank-number {
      background: linear-gradient(135deg, #0f766e, #14b8a6);
    }
    h2 {
      margin: 0 0 10px;
      font-size: clamp(20px, 3vw, 24px);
      line-height: 1.15;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      font: inherit;
      line-height: 1.7;
    }
    @media (max-width: 720px) {
      .menu-toggle {
        display: inline-flex;
      }
      .site-nav {
        position: absolute;
        top: calc(100% + 8px);
        right: 20px;
        left: 20px;
        display: none;
        flex-direction: column;
        align-items: stretch;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(255, 250, 240, 0.96);
        box-shadow: var(--shadow);
      }
      .site-nav.open {
        display: flex;
      }
      .site-nav a {
        width: 100%;
        text-align: center;
      }
      main {
        padding-top: 28px;
      }
      .card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="./index.html">
        <strong>GitHub Check</strong>
        <span>repo digest and weekly ranking</span>
      </a>
      <button class="menu-toggle" aria-label="メニューを開く" aria-expanded="false" aria-controls="site-nav">
        <span class="menu-icon" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
      <nav id="site-nav" class="site-nav">
        <a href="./index.html" >履歴</a>
        <a href="./weekly.html" aria-current="page">週間トップ10</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="hero">
      <h1>Weekly Top 10</h1>
      <p>3/23 - 3/29 の通知履歴から作ったランキングです。毎週月曜日に更新されます。</p>
    </section>
    <p>まだ週間ランキングはありません。</p>
  </main>
  <script>
    const toggle = document.querySelector('.menu-toggle');
    const nav = document.getElementById('site-nav');
    if (toggle && nav) {
      toggle.addEventListener('click', () => {
        const expanded = toggle.getAttribute('aria-expanded') === 'true';
        toggle.setAttribute('aria-expanded', String(!expanded));
        nav.classList.toggle('open');
      });
      nav.querySelectorAll('a').forEach((link) => {
        link.addEventListener('click', () => {
          nav.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
        });
      });
    }
    const daySelect = document.querySelector('[data-day-select]');
    const panels = document.querySelectorAll('.tab-panel');
    if (daySelect) {
      daySelect.addEventListener('change', () => {
        const target = daySelect.value;
        for (const panel of panels) panel.classList.remove('active');
        document.getElementById(target)?.classList.add('active');
      });
    }
    const filterButtons = document.querySelectorAll('[data-bucket-filter]');
    const cards = document.querySelectorAll('[data-bucket]');
    for (const button of filterButtons) {
      button.addEventListener('click', () => {
        const target = button.dataset.bucketFilter;
        for (const item of filterButtons) item.classList.remove('active');
        button.classList.add('active');
        for (const card of cards) {
          const matches = target === 'all' || card.dataset.bucket === target;
          card.classList.toggle('hidden-by-filter', !matches);
        }
      });
    }
  </script>
</body>
</html>
